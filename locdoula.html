
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J. Tyler Creations & Co. — The Loc Doula</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#07080a;--surface:rgba(255,255,255,0.045);--border:rgba(255,255,255,0.08);
    --gold:#c9a84c;--gold2:#e8c97a;--white:#fff;--gray:rgba(255,255,255,0.45);
    --card:#111209;--green:#4eff91;--blue:#4ec9ff;--rose:#ff8fab;
  }
  html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--white);overflow:hidden}
  body{display:flex;align-items:center;justify-content:center;padding:12px}
  .blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
  .blob1{top:-5%;left:-5%;width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,.12) 0%,transparent 70%);animation:float1 12s ease-in-out infinite}
  .blob2{bottom:-10%;right:-5%;width:600px;height:600px;background:radial-gradient(circle,rgba(232,201,122,.08) 0%,transparent 70%);animation:float2 15s ease-in-out infinite}
  .shell{position:relative;z-index:1;width:100%;max-width:700px;height:92vh;max-height:860px;display:flex;flex-direction:column;background:var(--surface);backdrop-filter:blur(28px);border-radius:28px;border:1px solid var(--border);box-shadow:0 40px 100px rgba(0,0,0,.7);overflow:hidden}
  .header{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02);flex-shrink:0}
  .brand{display:flex;align-items:center;gap:10px}
  .brand-icon{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(201,168,76,.4)}
  .brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.01em}
  .brand-sub{font-size:10px;color:var(--gray);letter-spacing:.06em;margin-top:1px}
  .status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2.5s infinite}
  .rating{font-size:12px;color:var(--gold);font-weight:600}
  .tabs{display:flex;padding:0 16px;border-bottom:1px solid var(--border);gap:2px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:10px 14px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--gray);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;margin-bottom:-1px;white-space:nowrap}
  .tab.active{color:var(--white);border-bottom-color:var(--gold)}
  .panel{display:none;flex:1;flex-direction:column;overflow:hidden}
  .panel.active{display:flex}
  .scroll{flex:1;overflow-y:auto;padding:16px 18px}
  .scroll::-webkit-scrollbar{width:4px}
  .scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
  /* chat */
  .chat-area{flex:1;overflow-y:auto;padding:18px 18px 8px;display:flex;flex-direction:column;gap:12px}
  .chat-area::-webkit-scrollbar{width:4px}
  .chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
  .msg-row{display:flex;align-items:flex-end;gap:8px;animation:fadeUp .3s ease}
  .msg-row.user{justify-content:flex-end}
  .avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:15px}
  .bubble{max-width:76%;padding:10px 14px;font-size:14px;line-height:1.6}
  .bubble.ai{border-radius:16px 16px 16px 4px;background:rgba(255,255,255,.07);border:1px solid var(--border);color:rgba(255,255,255,.85)}
  .bubble.user{border-radius:16px 16px 4px 16px;background:linear-gradient(135deg,#7c5cfc,#9b70ff);color:#fff;max-width:72%}
  .typing span{display:inline-block;width:6px;height:6px;background:rgba(255,255,255,.5);border-radius:50%;margin:0 2px;animation:bounce .9s infinite}
  .typing span:nth-child(2){animation-delay:.15s}
  .typing span:nth-child(3){animation-delay:.3s}
  .quick-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px;flex-shrink:0}
  .chip{padding:6px 12px;border-radius:20px;border:1px solid rgba(201,168,76,.2);background:rgba(201,168,76,.06);color:rgba(255,255,255,.65);font-size:12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
  .chip:hover{background:rgba(201,168,76,.15)}
  .input-row{display:flex;gap:8px;padding:10px 14px 14px;border-top:1px solid var(--border);background:rgba(255,255,255,.02);flex-shrink:0}
  .chat-input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:10px 14px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
  .send-btn{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#fff;font-size:15px;cursor:pointer;flex-shrink:0;transition:opacity .2s}
  .send-btn:disabled{opacity:.35}
  /* slots */
  .slots-bubble{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:16px 16px 16px 4px;padding:12px 14px;max-width:90%;animation:fadeUp .3s ease}
  .slots-title{font-size:13px;color:var(--gray);margin-bottom:10px}
  .slots-grid{display:flex;flex-wrap:wrap;gap:6px}
  .slot-btn{padding:7px 13px;border-radius:10px;border:1px solid rgba(201,168,76,.2);background:rgba(201,168,76,.06);color:rgba(255,255,255,.8);font-size:12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
  .slot-btn:hover{background:rgba(201,168,76,.2);border-color:var(--gold);color:var(--gold)}
  .slot-btn.booked{background:rgba(78,255,145,.08);border-color:rgba(78,255,145,.3);color:var(--green);cursor:default}
  /* book */
  .intake-wrap{max-width:480px;margin:0 auto}
  .intake-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:6px}
  .step-dots{display:flex;gap:6px;margin-bottom:20px}
  .step-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);transition:background .3s}
  .step-dot.done{background:var(--gold)}
  .step-label{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}
  .form-step{display:flex;flex-direction:column;gap:14px;animation:fadeUp .3s ease}
  .field-group{display:flex;flex-direction:column;gap:6px}
  .field-label{font-size:12px;color:var(--gray);font-weight:500}
  .field{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:11px 14px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;width:100%;outline:none}
  .field:focus{border-color:rgba(201,168,76,.5)}
  .svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .svc-option{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
  .svc-option.selected{background:rgba(201,168,76,.15);border-color:var(--gold)}
  .svc-icon{font-size:22px}
  .svc-name{font-size:11px;color:rgba(255,255,255,.8);font-weight:500;text-align:center;line-height:1.3}
  .svc-price{font-size:11px;color:var(--gold)}
  .avail-day-label{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin:14px 0 8px}
  .time-slots{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
  .time-slot{padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.75);font-size:13px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
  .time-slot:hover{background:rgba(201,168,76,.15);border-color:var(--gold)}
  .time-slot.taken{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.05);color:rgba(255,255,255,.2);cursor:not-allowed;text-decoration:line-through}
  .time-slot.selected-slot{background:rgba(201,168,76,.25);border-color:var(--gold);color:var(--gold);font-weight:600}
  .nav-row{display:flex;justify-content:space-between;gap:10px;margin-top:4px}
  .next-btn{flex:1;padding:12px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
  .next-btn:disabled{opacity:.35;cursor:not-allowed}
  .back-btn{padding:12px 18px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.5);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif}
  .success-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px 20px;text-align:center}
  .success-icon{font-size:52px}
  .success-title{font-family:'Syne',sans-serif;font-weight:800;font-size:24px}
  .success-sub{font-size:14px;color:var(--gray);max-width:300px;line-height:1.5}
  .summary-card{width:100%;max-width:360px;background:rgba(255,255,255,.06);border-radius:16px;border:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:10px}
  .summary-row{display:flex;justify-content:space-between;font-size:13px}
  .summary-label{color:rgba(255,255,255,.35)}
  .summary-val{color:#fff;font-weight:500}
  .reset-btn{padding:11px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
  /* services */
  .svc-list{display:flex;flex-direction:column;gap:9px}
  .svc-card{display:flex;align-items:flex-start;gap:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:13px 14px}
  .svc-card-icon{font-size:24px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:rgba(201,168,76,.1);border-radius:11px;flex-shrink:0}
  .svc-info{flex:1}
  .svc-card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#fff}
  .svc-card-desc{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;line-height:1.4}
  .svc-time-label{font-size:10px;color:rgba(255,255,255,.3);margin-top:3px}
  .svc-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
  .svc-price{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--gold)}
  .book-small{padding:5px 12px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
  .svc-category{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--gold);letter-spacing:.05em;text-transform:uppercase;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid rgba(201,168,76,.15)}
  /* history */
  .history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .history-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px}
  .history-count{font-size:12px;color:var(--gray);background:rgba(255,255,255,.07);padding:4px 10px;border-radius:20px}
  .appt-card{display:flex;justify-content:space-between;align-items:flex-start;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:13px 14px;margin-bottom:8px;gap:10px}
  .appt-client{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:3px}
  .appt-meta{font-size:12px;color:rgba(255,255,255,.45)}
  .appt-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
  .status-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:capitalize}
  .appt-actions{display:flex;gap:5px}
  .confirm-btn{padding:5px 10px;border-radius:8px;border:none;background:rgba(78,255,145,.2);color:var(--green);font-size:11px;cursor:pointer}
  .cancel-btn{padding:5px 8px;border-radius:8px;border:none;background:rgba(255,110,80,.15);color:#ff6e50;font-size:11px;cursor:pointer}
  .complete-btn{padding:5px 10px;border-radius:8px;border:none;background:rgba(78,201,255,.15);color:var(--blue);font-size:11px;cursor:pointer}
  /* dashboard */
  .dash-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:2px}
  .dash-sub{font-size:12px;color:var(--gray);margin-bottom:16px}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .stat-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:16px 14px}
  .stat-icon{font-size:22px;margin-bottom:4px}
  .stat-value{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;margin-bottom:2px}
  .stat-label{font-size:11px;color:var(--gray)}
  .section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:10px;margin-top:6px}
  .schedule-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border-radius:12px;padding:11px 13px;margin-bottom:7px;border:1px solid rgba(255,255,255,.06)}
  .schedule-time{font-size:13px;color:var(--gold);font-weight:600;width:70px;flex-shrink:0}
  .schedule-client{font-size:14px;font-weight:600}
  .schedule-meta{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
  /* availability */
  .avail-header{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;margin-bottom:4px}
  .avail-desc{font-size:13px;color:var(--gray);margin-bottom:16px;line-height:1.5}
  .day-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
  .day-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
  .day-closed{font-size:11px;color:rgba(255,110,80,.7);background:rgba(255,110,80,.1);padding:3px 9px;border-radius:20px}
  .day-open{font-size:11px;color:var(--green);background:rgba(78,255,145,.1);padding:3px 9px;border-radius:20px}
  .day-slots{display:flex;flex-wrap:wrap;gap:6px}
  .manage-slot{padding:6px 12px;border-radius:9px;font-size:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
  .manage-slot.blocked{background:rgba(255,110,80,.12);border-color:rgba(255,110,80,.3);color:rgba(255,110,80,.7);text-decoration:line-through}
  @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}}
  @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,30px)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  /* api key modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
  .modal-box{background:#111209;border:1px solid rgba(201,168,76,.25);border-radius:22px;padding:28px 24px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:16px;box-shadow:0 30px 80px rgba(0,0,0,.8)}
  .modal-icon{font-size:36px;text-align:center}
  .modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;text-align:center}
  .modal-sub{font-size:13px;color:var(--gray);text-align:center;line-height:1.5}
  .modal-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:11px 14px;color:#fff;font-size:13px;font-family:'DM Sans',sans-serif;width:100%;outline:none;letter-spacing:.03em}
  .modal-input:focus{border-color:rgba(201,168,76,.5)}
  .modal-btn{padding:12px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
  .modal-hint{font-size:11px;color:rgba(255,255,255,.25);text-align:center;line-height:1.5}
  .key-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gray);cursor:pointer;padding:4px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);transition:background .2s}
  .key-badge:hover{background:rgba(255,255,255,.07)}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="shell">
  <div class="header">
    <div class="brand">
      <div class="brand-icon">🌿</div>
      <div>
        <div class="brand-name">J. Tyler Creations & Co.</div>
        <div class="brand-sub">The Loc Doula · Douglasville, GA</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="rating">★ 5.0</div>
      <div class="status"><span class="dot"></span>Online</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('chat',this)">Chat</button>
    <button class="tab" onclick="switchTab('book',this)">Book</button>
    <button class="tab" onclick="switchTab('services',this)">Services</button>
    <button class="tab" onclick="switchTab('history',this)">History</button>
    <button class="tab" onclick="switchTab('dashboard',this)">Dashboard</button>
    <button class="tab" onclick="switchTab('availability',this)">⚙️ Hours</button>
  </div>

  <!-- CHAT -->
  <div class="panel active" id="panel-chat">
    <div class="chat-area" id="chat-area">
      <div class="msg-row">
        <div class="avatar">🌿</div>
        <div class="bubble ai">Hey love! 💛 Welcome to <strong>J. Tyler Creations & Co.</strong> — home of The Loc Doula. I can help you book an appointment, learn about our services, or check availability. How can I support your loc journey today?</div>
      </div>
    </div>
    <div class="quick-wrap" id="quick-wrap">
      <button class="chip" onclick="sendQuick('What times are available this week?')">📅 Check Availability</button>
      <button class="chip" onclick="sendQuick('I\'d like to start my loc journey')">🌿 Start Locs</button>
      <button class="chip" onclick="sendQuick('I need a retwist')">✨ Retwist</button>
      <button class="chip" onclick="sendQuick('What services do you offer?')">💛 Services</button>
      <button class="chip" onclick="sendQuick('How much does a retwist cost?')">💰 Pricing</button>
      <button class="chip" onclick="sendQuick('Tell me about The Loc Doula')">🙋 About Janae</button>
    </div>
    <div class="input-row">
      <input class="chat-input" id="chat-input" placeholder="Ask about availability, services, locs..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- BOOK -->
  <div class="panel" id="panel-book">
    <div class="scroll"><div class="intake-wrap" id="intake-wrap"></div></div>
  </div>

  <!-- SERVICES -->
  <div class="panel" id="panel-services">
    <div class="scroll" id="svc-scroll"></div>
  </div>

  <!-- HISTORY -->
  <div class="panel" id="panel-history">
    <div class="scroll" id="history-scroll"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="panel" id="panel-dashboard">
    <div class="scroll" id="dashboard-scroll"></div>
  </div>

  <!-- AVAILABILITY -->
  <div class="panel" id="panel-availability">
    <div class="scroll" id="avail-scroll"></div>
  </div>
</div>

<script>
const SHOP = {
  name: 'J. Tyler Creations & Co.',
  stylist: 'Janae Tyler',
  aka: 'The Loc Doula',
  address: '7447 Douglas Blvd Suite 103, Douglasville, GA 30135',
  phone: '(678) 221-6492',
  slotMinutes: 60,
  schedule: {
    Mon: [],
    Tue: [],
    Wed: ['9:00','10:00','11:00','12:00','1:00','2:00','3:00'],
    Thu: ['9:00','10:00','11:00','12:00','1:00','2:00','3:00'],
    Fri: ['9:00','10:00','11:00','12:00','1:00','2:00','3:00'],
    Sat: ['9:00','10:00','11:00','12:00','1:00','2:00'],
    Sun: [],
  }
};

let blockedSlots = JSON.parse(localStorage.getItem('blocked_locdoula')||'[]');
function saveBlocked(){localStorage.setItem('blocked_locdoula',JSON.stringify(blockedSlots));}

function saveAppts(){localStorage.setItem('appts_locdoula',JSON.stringify(APPOINTMENTS));}

function getAvailableSlots(day){
  const slots=SHOP.schedule[day]||[];
  const booked=APPOINTMENTS.filter(a=>a.day===day&&(a.status==='confirmed'||a.status==='pending')).map(a=>a.time);
  return slots.map(t=>({time:t,available:!booked.includes(t)&&!blockedSlots.includes(day+'-'+t)}));
}
function getWeekAvailability(){
  const result={};
  Object.keys(SHOP.schedule).forEach(d=>{
    const avail=getAvailableSlots(d).filter(s=>s.available);
    if(avail.length)result[d]=avail.map(s=>s.time);
  });
  return result;
}
function formatTime(t){
  const [h,m]=t.split(':').map(Number);
  const ampm=h>=12?'PM':'AM';
  return `${h%12||12}:${(m||0).toString().padStart(2,'0')} ${ampm}`;
}

async function sendMessage(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text||loading)return;
  input.value='';
  document.getElementById('quick-wrap').style.display='none';
  addMsg('user',text);
  chatHistory.push({role:'user',content:text});
  showTyping();loading=true;
  document.getElementById('send-btn').disabled=true;
  try{
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({system: buildSystemPrompt(), messages: chatHistory})
    });
    const data = await res.json();
    if(!res.ok){throw new Error(data.error?.message||JSON.stringify(data));}
    const reply = data.reply || 'Sorry, try again!';
    chatHistory.push({role:'assistant',content:reply});
    removeTyping();addMsg('ai',reply);
    if(text.toLowerCase().match(/available|open|free|time|slot|book|when/))showSlotPicker();
  }catch(e){removeTyping();addMsg('ai','Error: '+e.message);console.error(e);}
  loading=false;document.getElementById('send-btn').disabled=false;
}
function sendQuick(text){document.getElementById('chat-input').value=text;sendMessage();}
function addMsg(role,text){
  const area=document.getElementById('chat-area');
  const row=document.createElement('div');
  row.className='msg-row'+(role==='user'?' user':'');
  const bubble=document.createElement('div');
  bubble.className='bubble '+role;
  bubble.innerHTML=text.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  if(role==='ai'){const av=document.createElement('div');av.className='avatar';av.textContent='🌿';row.appendChild(av);}
  row.appendChild(bubble);area.appendChild(row);area.scrollTop=area.scrollHeight;
}
function showTyping(){const area=document.getElementById('chat-area');const row=document.createElement('div');row.className='msg-row';row.id='typing-row';row.innerHTML='<div class="avatar">🌿</div><div class="bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>';area.appendChild(row);area.scrollTop=area.scrollHeight;}
function removeTyping(){const t=document.getElementById('typing-row');if(t)t.remove();}
function showSlotPicker(){
  const area=document.getElementById('chat-area');
  const avail=getWeekAvailability();
  if(!Object.keys(avail).length)return;
  const wrap=document.createElement('div');wrap.className='msg-row';
  const box=document.createElement('div');box.className='slots-bubble';
  box.innerHTML='<div class="slots-title">📅 Tap a slot to pre-select it:</div>';
  const grid=document.createElement('div');grid.className='slots-grid';
  let count=0;
  Object.entries(avail).forEach(([day,slots])=>{
    slots.slice(0,3).forEach(t=>{
      if(count>=9)return;
      const btn=document.createElement('button');btn.className='slot-btn';
      btn.textContent=`${day} ${formatTime(t)}`;
      btn.onclick=()=>{intakeData={day,time:t};btn.classList.add('booked');btn.textContent='✓ '+btn.textContent;btn.onclick=null;addMsg('ai',`💛 Pre-selected **${day} at ${formatTime(t)}**. Head to the **Book** tab to complete your appointment!`);document.getElementById('chat-area').scrollTop=9999;};
      grid.appendChild(btn);count++;
    });
  });
  box.appendChild(grid);wrap.appendChild(box);area.appendChild(wrap);area.scrollTop=area.scrollHeight;
}

function switchTab(name,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='services')renderServices();
  if(name==='history')renderHistory();
  if(name==='dashboard')renderDashboard();
  if(name==='book')renderIntake();
  if(name==='availability')renderAvailability();
}

function iNext(from){
  if(from===0){intakeData.name=document.getElementById('f-name')?.value||'';intakeData.phone=document.getElementById('f-phone')?.value||'';intakeData.email=document.getElementById('f-email')?.value||'';intakeData.request=document.getElementById('f-request')?.value||'';if(!intakeData.name||!intakeData.phone){alert('Please enter your name and phone.');return;}}
  if(from===1&&!intakeData.service){alert('Please choose a service.');return;}
  if(from===2&&!intakeData.day){alert('Please select a time slot.');return;}
  intakeStep=from+1;renderIntake();
}
function iPrev(){intakeStep=Math.max(0,intakeStep-1);renderIntake();}
function iSubmit(){
  APPOINTMENTS.push({id:Date.now(),client:intakeData.name,service:intakeData.service,day:intakeData.day,time:intakeData.time,status:'pending',phone:intakeData.phone});
  saveAppts();intakeData.submitted=true;renderSuccess();
}
function iReset(){intakeStep=0;intakeData={};renderIntake();}

function renderAvailability(){
  document.getElementById('avail-scroll').innerHTML=`<div class="avail-header">⚙️ Manage Hours</div>
    <div class="avail-desc">Tap any slot to block it off. Clients won't see blocked slots. Changes save automatically.</div>
    ${Object.entries(SHOP.schedule).map(([day,slots])=>`
    <div class="day-card">
      <div class="day-name">${day}<span class="${slots.length?'day-open':'day-closed'}">${slots.length?'Open':'Closed'}</span></div>
      ${slots.length?`<div class="day-slots">${slots.map(t=>{
        const key=day+'-'+t;
        const isBlocked=blockedSlots.includes(key);
        const isBooked=APPOINTMENTS.some(a=>a.day===day&&a.time===t&&(a.status==='confirmed'||a.status==='pending'));
        return `<button class="manage-slot${isBlocked?' blocked':''}" onclick="toggleBlock('${key}',this)" style="${isBooked?'border-color:rgba(78,255,145,.3);color:rgba(78,255,145,.6)':''}">${isBooked?'🔒 ':''}${formatTime(t)}</button>`;
      }).join('')}</div>`:'<div style="color:var(--gray);font-size:12px">Closed</div>'}
    </div>`).join('')}`;
}
function toggleBlock(key,btn){
  const idx=blockedSlots.indexOf(key);
  if(idx>-1){blockedSlots.splice(idx,1);btn.classList.remove('blocked');}
  else{blockedSlots.push(key);btn.classList.add('blocked');}
  saveBlocked();
}
function clearTestData(){
  if(!confirm('Clear all test data and start fresh?'))return;
  APPOINTMENTS=[];saveAppts();blockedSlots=[];saveBlocked();
  renderDashboard();renderHistory();
